<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CO-Logic | Maître</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: 900; }
        tr:nth-child(even) { background-color: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-black italic uppercase">CO-LOGIC <span class="text-blue-500">MASTER</span></h1>
        <button onclick="exportIdoceo()" class="bg-green-600 px-4 py-2 rounded-lg font-bold text-xs">EXPORT IDOCEO</button>
    </header>

    <div class="flex border-b border-slate-700 mb-6 uppercase text-[10px] font-bold tracking-widest">
        <button id="btnTabEleves" onclick="switchTab('eleves')" class="px-4 py-3 tab-active">👨‍🎓 Liste & Attribution</button>
        <button id="btnTabBilan" onclick="switchTab('bilan')" class="px-4 py-3 text-slate-400">📊 Scores Live</button>
        <button id="btnTabCorrection" onclick="switchTab('correction')" class="px-4 py-3 text-slate-400">📝 Correction</button>
    </div>

    <div id="viewEleves" class="space-y-4">
        <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
            <h3 class="font-bold mb-4 uppercase text-sm">Importer vos élèves (CSV)</h3>
            <input type="file" id="csvFile" accept=".csv" class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer"/>
            <p class="text-[10px] mt-2 opacity-50">Format : Nom;Prénom (ou une colonne avec Nom Prénom)</p>
        </div>
        
        <div id="eleveList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
            </div>
    </div>

    <div id="viewBilan" class="hidden">
        <div id="scoreStats" class="grid grid-cols-3 gap-4 mb-6"></div>
        <div class="bg-slate-800 rounded-2xl overflow-hidden border border-slate-700">
            <table class="w-full text-left text-xs" id="scoreTable"></table>
        </div>
    </div>

    <div id="viewCorrection" class="hidden">
        <div id="matrixContainer" class="bg-slate-800 rounded-2xl overflow-x-auto border border-slate-700"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://orientshow-3a86f-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let eleves = JSON.parse(localStorage.getItem('co_eleves')) || [];
        let scores = {};

        // GESTION CSV ET ACCENTS
        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                let content = event.target.result;
                // Correction manuelle des caractères accentués mal encodés (UTF-8/ISO)
                content = content.replace(//g, 'e'); 
                const lines = content.split(/\r?\n/);
                eleves = [];
                for(let i=1; i<lines.length; i++) {
                    if(lines[i].trim()) {
                        eleves.push({ name: lines[i].replace(/"/g, '').trim(), color: '', num: '' });
                    }
                }
                saveEleves();
                renderEleveList();
            };
            reader.readAsText(file, "UTF-8");
        });

        function saveEleves() {
            localStorage.setItem('co_eleves', JSON.stringify(eleves));
        }

        function renderEleveList() {
            const container = document.getElementById('eleveList');
            container.innerHTML = eleves.map((eleve, index) => `
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex flex-col gap-2">
                    <span class="font-bold text-sm truncate">${eleve.name}</span>
                    <div class="flex gap-1">
                        <select onchange="assignEleve(${index}, 'color', this.value)" class="bg-slate-900 text-[10px] p-1 rounded border border-slate-600 flex-1">
                            <option value="">COULEUR</option>
                            <option value="NOIR" ${eleve.color==='NOIR'?'selected':''}>NOIR</option>
                            <option value="ROUGE" ${eleve.color==='ROUGE'?'selected':''}>ROUGE</option>
                            <option value="BLEU" ${eleve.color==='BLEU'?'selected':''}>BLEU</option>
                            <option value="VERT" ${eleve.color==='VERT'?'selected':''}>VERT</option>
                            <option value="JAUNE" ${eleve.color==='JAUNE'?'selected':''}>JAUNE</option>
                        </select>
                        <input type="number" placeholder="N°" value="${eleve.num}" onchange="assignEleve(${index}, 'num', this.value)" class="bg-slate-900 text-[10px] w-12 p-1 rounded border border-slate-600 text-center">
                    </div>
                </div>
            `).join('');
        }

        function assignEleve(index, field, value) {
            eleves[index][field] = value.toUpperCase();
            saveEleves();
        }

        function switchTab(tab) {
            ['viewEleves', 'viewBilan', 'viewCorrection'].forEach(id => document.getElementById(id).classList.add('hidden'));
            ['btnTabEleves', 'btnTabBilan', 'btnTabCorrection'].forEach(id => document.getElementById(id).classList.remove('tab-active', 'text-blue-500'));
            
            const activeId = 'view' + tab.charAt(0).toUpperCase() + tab.slice(1);
            const activeBtn = 'btnTab' + tab.charAt(0).toUpperCase() + tab.slice(1);
            document.getElementById(activeId).classList.remove('hidden');
            document.getElementById(activeBtn).classList.add('tab-active');
            if(tab === 'eleves') renderEleveList();
        }

        // ... (Reste de la logique Scores et Correction identique au message précédent) ...

        renderEleveList(); // Initialisation
    </script>
</body>
</html>
