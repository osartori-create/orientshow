<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orient'Show | Maître</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; font-weight: 900; }
        tr:nth-child(even) { background-color: rgba(255,255,255,0.02); }
        .color-dot { width: 26px; height: 26px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); }
        .dot-NOIR { background-color: #000; } .dot-ROUGE { background-color: #ef4444; } .dot-BLEU { background-color: #3b82f6; } .dot-VERT { background-color: #22c55e; } .dot-JAUNE { background-color: #eab308; }
        .row-NOIR { border-left: 4px solid #000; background: rgba(0,0,0,0.2); }
        .row-ROUGE { border-left: 4px solid #ef4444; background: rgba(239,68,68,0.05); }
        .row-BLEU { border-left: 4px solid #3b82f6; background: rgba(59,130,246,0.05); }
        .row-VERT { border-left: 4px solid #22c55e; background: rgba(34,197,94,0.05); }
        .row-JAUNE { border-left: 4px solid #eab308; background: rgba(234,179,8,0.05); }
        .eleve-row { display: grid; grid-template-columns: 1fr 150px 80px; gap: 10px; align-items: center; border-bottom: 1px solid #1e293b; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-black text-blue-500 italic uppercase">Master Console</h1>
        <div class="flex gap-2">
            <button onclick="exportIdoceo()" class="bg-green-600 px-4 py-2 rounded-lg font-bold text-[10px] uppercase">Export</button>
            <button onclick="resetData()" class="bg-red-600 px-4 py-2 rounded-lg font-bold text-[10px] uppercase">Vider</button>
        </div>
    </header>

    <div class="flex border-b border-slate-700 mb-6 uppercase text-[10px] font-bold tracking-widest overflow-x-auto">
        <button id="btnTabEleves" onclick="switchTab('eleves')" class="px-4 py-3 tab-active whitespace-nowrap">👨‍🎓 Liste</button>
        <button id="btnTabBilan" onclick="switchTab('bilan')" class="px-4 py-3 text-slate-400 whitespace-nowrap">📊 Résultats</button>
        <button id="btnTabCorrection" onclick="switchTab('correction')" class="px-4 py-3 text-slate-400 whitespace-nowrap">📝 Correction</button>
    </div>

    <div id="viewEleves" class="space-y-4">
        <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl">
            <div class="flex flex-col md:flex-row gap-4 items-end">
                <div class="flex-1 w-full">
                    <label class="block text-[10px] font-bold mb-2 opacity-50 uppercase">Classe :</label>
                    <div class="flex gap-2">
                        <select id="selectClasse" onchange="changeClasse(this.value)" class="bg-slate-900 border border-slate-600 rounded-lg p-2 text-sm font-bold flex-1"></select>
                        <button onclick="ajouterClasse()" class="bg-blue-600 px-3 rounded-lg font-bold">+</button>
                    </div>
                </div>
                <div class="flex-1 w-full">
                    <label class="block text-[10px] font-bold mb-2 opacity-50 uppercase">CSV iDoceo :</label>
                    <input type="file" id="csvFile" accept=".csv" class="text-xs text-slate-400 cursor-pointer"/>
                </div>
            </div>
            <button onclick="ajouterEleveManuel()" class="w-full mt-4 bg-slate-700 py-2 rounded-xl text-[10px] font-bold uppercase border border-slate-600">+ Ajouter élève</button>
        </div>
        <div id="eleveList" class="flex flex-col gap-1"></div>
    </div>

    <div id="viewBilan" class="hidden">
        <div class="bg-slate-800 rounded-2xl overflow-hidden border border-slate-700">
            <table class="w-full text-left text-[11px]">
                <thead class="bg-slate-900 font-bold uppercase opacity-60">
                    <tr><th class="p-4">Élève</th><th class="p-4 text-center">/60</th><th class="p-4 text-center text-blue-400">/20</th><th class="p-4">Progression</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="viewCorrection" class="hidden">
        <div id="matrixContainer" class="bg-slate-800 rounded-2xl overflow-x-auto border border-slate-700"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://orientshow-3a86f-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let toutesLesClasses = JSON.parse(localStorage.getItem('co_logic_classes')) || { "305": [] };
        let classeActive = localStorage.getItem('co_logic_active_name') || Object.keys(toutesLesClasses)[0];
        let sessions = {}; let matrix = {}; const colors = ["NOIR", "ROUGE", "BLEU", "VERT", "JAUNE"];

        function initGestionnaire() {
            const select = document.getElementById('selectClasse');
            select.innerHTML = Object.keys(toutesLesClasses).map(name => `<option value="${name}" ${name === classeActive ? 'selected' : ''}>${name}</option>`).join('');
            renderEleveList();
        }

        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0]; const reader = new FileReader();
            reader.onload = function(event) {
                const lines = event.target.result.split(/\r?\n/).filter(l => l.trim() !== "");
                const newName = prompt("Nom de la classe ?", "402"); if(!newName) return;
                const header = lines[0].replace(/"/g, '').split(lines[0].includes(';') ? ';' : ',');
                const idxName = header.indexOf('@name'); const idxLast = header.indexOf('@lastname');
                toutesLesClasses[newName] = lines.slice(1).map(line => {
                    const sep = line.includes(';') ? ';' : ','; const parts = line.split(sep).map(p => p.replace(/"/g, '').trim());
                    return { name: (parts[idxLast] || "").toUpperCase() + " " + (parts[idxName] || ""), color: '', num: '' };
                }).sort((a,b) => a.name.localeCompare(b.name));
                classeActive = newName; saveGlobal(); initGestionnaire();
            };
            reader.readAsText(file, "ISO-8859-1");
        });

        function renderEleveList() {
            const container = document.getElementById('eleveList'); const liste = toutesLesClasses[classeActive] || [];
            container.innerHTML = liste.map((e, i) => `
                <div class="p-3 px-4 eleve-row row-${e.color}">
                    <span class="font-bold text-[11px] truncate uppercase">${e.name}</span>
                    <div class="flex gap-1 justify-center">
                        ${colors.map(c => `<button onclick="updateE(${i},'color','${c}')" class="color-dot dot-${c} ${e.color===c?'ring-2 ring-white scale-110':'opacity-30'}"></button>`).join('')}
                    </div>
                    <select onchange="updateE(${i},'num',this.value)" class="bg-slate-900 text-xs p-1 rounded border border-slate-700 font-bold text-center">
                        <option value="">-</option>${[1,2,3,4,5,6].map(n => `<option value="${n}" ${e.num==n?'selected':''}>${n}</option>`).join('')}
                    </select>
                </div>`).join('');
        }

        function updateE(i, f, v) { toutesLesClasses[classeActive][i][f] = v; saveGlobal(); renderEleveList(); }

        function ajouterClasse() { const nom = prompt("Nom de la classe :"); if(nom) { toutesLesClasses[nom]=[]; classeActive=nom; saveGlobal(); initGestionnaire(); } }
        function saveGlobal() { localStorage.setItem('co_logic_classes', JSON.stringify(toutesLesClasses)); localStorage.setItem('co_logic_active_name', classeActive); }

        function switchTab(tab) {
            ['viewEleves', 'viewBilan', 'viewCorrection'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('view'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.remove('hidden');
            if(tab === 'bilan') updateBilan();
        }

        db.ref('sessions').on('value', snap => { sessions = snap.val() || {}; updateBilan(); });
        db.ref('settings/matrix').on('value', snap => { matrix = snap.val() || initMatrix(); drawMatrix(); });

        function updateBilan() {
            const tbody = document.getElementById('tableBody'); if(!tbody) return; tbody.innerHTML = "";
            (toutesLesClasses[classeActive] || []).forEach(e => {
                if(!e.color || !e.num) return;
                const data = sessions[`${e.color}_${e.num}`] || {};
                const p60 = Object.values(data).reduce((acc, c) => acc + c.score, 0);
                const nb = Object.keys(data).length;
                tbody.innerHTML += `<tr><td class="p-4 font-bold text-xs">${e.name} <br><span class="text-[9px] opacity-40">${e.color} ${e.num}</span></td><td class="p-4 text-center font-bold">${p60}</td><td class="p-4 text-center font-black text-blue-400 text-lg">${(p60/3).toFixed(1)}</td><td class="p-4"><div class="bg-slate-900 h-1.5 rounded-full overflow-hidden"><div class="bg-blue-500 h-1.5 rounded-full" style="width:${(nb/12)*100}%"></div></div></td></tr>`;
            });
        }

        function drawMatrix() {
            const container = document.getElementById('matrixContainer');
            let html = `<table class="w-full text-center text-[9px] border-collapse"><thead class="bg-slate-900 uppercase"><tr><th class="p-2">#</th>`;
            colors.forEach(col => { html += `<th colspan="2" class="p-2 border-l border-slate-700">${col}</th>`; });
            html += `</tr></thead><tbody>`;
            for(let c=1; c<=12; c++) {
                html += `<tr class="border-b border-slate-800"><td class="p-2 font-bold">${c}</td>`;
                colors.forEach(col => { const l = matrix[c][col]; html += `<td class="p-1"><input class="w-8 bg-transparent border border-slate-700 text-center uppercase" value="${l[0]}" onchange="upMat(${c},'${col}',0,this.value)"></td><td class="p-1"><input class="w-8 bg-transparent border border-slate-700 text-center uppercase" value="${l[1]}" onchange="upMat(${c},'${col}',1,this.value)"></td>`; });
                html += `</tr>`;
            }
            container.innerHTML = html + "</tbody></table>";
        }

        function upMat(c, col, i, v) { db.ref(`settings/matrix/${c}/${col}/${i}`).set(v.toUpperCase().trim()); }

        function initMatrix() {
            const def = {
                1: { NOIR:['D','Q'], ROUGE:['O','U'], BLEU:['Y','A'], VERT:['E','R'], JAUNE:['N','K'] },
                2: { NOIR:['E','X'], ROUGE:['X','Y'], BLEU:['T','L'], VERT:['R','O'], JAUNE:['A','L'] },
                3: { NOIR:['C','L'], ROUGE:['H','U'], BLEU:['1','B'], VERT:['O','1'], JAUNE:['T','E'] },
                4: { NOIR:['R','V'], ROUGE:['E','E'], BLEU:['C','R'], VERT:['T','N'], JAUNE:['O','S'] },
                5: { NOIR:['A','B'], ROUGE:['J','O'], BLEU:['O','U'], VERT:['N','E'], JAUNE:['C','S'] },
                6: { NOIR:['F','M'], ROUGE:['1','E'], BLEU:['C','R'], VERT:['U','O'], JAUNE:['S','U'] },
                7: { NOIR:['G','H'], ROUGE:['U','A'], BLEU:['E','C'], VERT:['U','H'], JAUNE:['X','E'] },
                8: { NOIR:['I','J'], ROUGE:['V','E'], BLEU:['R','A'], VERT:['E','N'], JAUNE:['S','S'] },
                9: { NOIR:['K','N'], ROUGE:['N','R'], BLEU:['R','C'], VERT:['Y','E'], JAUNE:['A','E'] },
                10: { NOIR:['O','S'], ROUGE:['S','C'], BLEU:['C','E'], VERT:['E','A'], JAUNE:['Z','N'] },
                11: { NOIR:['P','T'], ROUGE:['A','U'], BLEU:['L','Y'], VERT:['U','A'], JAUNE:['D','U'] },
                12: { NOIR:['U','W'], ROUGE:['L','M'], BLEU:['T','N'], VERT:['R','C'], JAUNE:['A','H'] }
            };
            db.ref('settings/matrix').set(def); return def;
        }

        function exportIdoceo() {
            let csv = "\uFEFFNom;Groupe;Pts_60;Note_20\n";
            (toutesLesClasses[classeActive] || []).forEach(e => {
                const data = sessions[`${e.color}_${e.num}`] || {};
                const p60 = Object.values(data).reduce((acc, c) => acc + c.score, 0);
                csv += `${e.name};${e.color} ${e.num};${p60};${(p60/3).toFixed(2)}\n`;
            });
            const blob = new Blob([csv], {type:'text/csv;charset=utf-8'}); const a = document.createElement('a');
            a.href = URL.createObjectURL(blob); a.download = `Resultats_${classeActive}.csv`; a.click();
        }

        function resetData() { if(prompt("Code RNE :")==="0680013V" && confirm("Vider session ?")) db.ref('sessions').remove(); }
        initGestionnaire();
    </script>
</body>
</html>
