<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orient'Show | Élève</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { background-color: #0f172a; touch-action: manipulation; }
        .btn-tap:active { transform: scale(0.95); }
        .btn-num { background-color: #1e293b; border: 2px solid #334155; }
        .btn-num.selected { background-color: #3b82f6; border-color: #60a5fa; font-weight: 900; }
        .bg-session-NOIR { background-color: #000; border: 2px solid #334155; }
        .bg-session-ROUGE { background-color: #991b1b; }
        .bg-session-BLEU { background-color: #1e40af; }
        .bg-session-VERT { background-color: #166534; }
        .bg-session-JAUNE { background-color: #ca8a04; color: black; }
    </style>
</head>
<body class="text-white font-sans">
    <div id="app" class="max-w-md mx-auto p-4 min-h-screen">
        
        <div id="step0" class="space-y-6 text-center py-10">
            <h2 class="text-3xl font-black text-blue-500 italic uppercase">Orient'Show</h2>
            <p class="text-xs font-bold opacity-50 uppercase">Choisis ta classe :</p>
            <div id="listeClasses" class="flex flex-col gap-4">
                <p class="text-sm italic opacity-30">Chargement des classes...</p>
            </div>
        </div>

        <div id="step1" class="hidden space-y-6">
            <div class="flex justify-between items-center opacity-50 text-[10px] font-bold uppercase">
                <span id="labelClasse"></span>
                <button onclick="location.reload()" class="underline">Retour</button>
            </div>
            <div>
                <p class="text-center text-xs font-black mb-3 opacity-50 uppercase">1. Ton numéro (1-6)</p>
                <div id="gridNumeros" class="grid grid-cols-3 gap-3">
                    <script>
                        for(let i=1;i<=6;i++) document.write(`<button onclick="selN(${i}, this)" class="btn-num p-5 rounded-2xl font-black text-2xl btn-tap">${i}</button>`);
                        let selectedNum = "";
                        function selN(n, btn) {
                            document.querySelectorAll('.btn-num').forEach(b => b.classList.remove('selected'));
                            btn.classList.add('selected'); selectedNum = n;
                        }
                    </script>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 pt-4 border-t border-slate-800">
                <button onclick="selectColor('NOIR')" class="bg-black border-2 border-slate-600 p-5 rounded-2xl font-black btn-tap">NOIR</button>
                <button onclick="selectColor('ROUGE')" class="bg-red-600 p-5 rounded-2xl font-black btn-tap">ROUGE</button>
                <button onclick="selectColor('BLEU')" class="bg-blue-600 p-5 rounded-2xl font-black btn-tap">BLEU</button>
                <button onclick="selectColor('VERT')" class="bg-green-600 p-5 rounded-2xl font-black btn-tap">VERT</button>
                <button onclick="selectColor('JAUNE')" class="bg-yellow-500 text-black p-5 rounded-2xl font-black btn-tap">JAUNE</button>
            </div>
        </div>

        <div id="step2" class="hidden space-y-6 animate-in slide-in-from-bottom">
            <div id="banner" class="p-6 rounded-3xl shadow-2xl flex justify-between items-center">
                <span id="displayUser" class="font-black text-3xl uppercase"></span>
                <button onclick="location.reload()" class="bg-white/20 p-2 rounded-lg text-[10px] font-black uppercase">Précédent</button>
            </div>
            <div id="containerSaisie" class="bg-slate-800 p-6 rounded-3xl border border-slate-700 space-y-6 shadow-xl">
                <div id="timerBlocker" class="hidden text-center py-10 space-y-4">
                    <div class="text-6xl">⏳</div>
                    <p class="font-black text-red-400 uppercase italic">Anti-Triche : Attends un peu...</p>
                    <p id="timerLabel" class="text-4xl font-mono"></p>
                </div>
                <div id="mainForm">
                    <label class="block text-center font-black uppercase text-sm opacity-60">Parcours :</label>
                    <select id="circuitNum" class="w-full p-5 bg-slate-900 rounded-2xl text-3xl font-black border-2 border-blue-600 text-center appearance-none text-white shadow-inner">
                        <option value="" selected disabled>-- CHOISIR --</option>
                    </select>
                    <div class="flex gap-4 justify-center my-8">
                        <input type="text" id="l1" maxlength="1" class="w-20 h-20 text-center text-5xl font-black bg-white text-slate-900 rounded-2xl uppercase shadow-lg">
                        <input type="text" id="l2" maxlength="1" class="w-20 h-20 text-center text-5xl font-black bg-white text-slate-900 rounded-2xl uppercase shadow-lg">
                    </div>
                    <button onclick="validerSaisie()" class="w-full bg-blue-600 p-6 rounded-2xl text-2xl font-black uppercase shadow-lg btn-tap">Vérifier</button>
                </div>
            </div>
        </div>

        <div id="feedback" class="hidden fixed inset-0 bg-slate-950 flex flex-col items-center justify-center z-50 text-center">
            <div id="iconScore" class="text-9xl mb-4"></div>
            <div id="msgPoints" class="text-6xl font-black tracking-tighter"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://orientshow-3a86f-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let CORRECTION = {}; let selectedColor = ""; let selectedClasse = "";

        // Récupération des classes depuis Firebase
        db.ref('settings/classes').on('value', snap => {
            const classes = snap.val() || [];
            const cont = document.getElementById('listeClasses');
            cont.innerHTML = "";
            if(classes.length === 0) cont.innerHTML = "<p class='text-xs opacity-40'>Aucune classe configurée sur l'iPad Maître.</p>";
            classes.forEach(c => {
                const b = document.createElement('button');
                b.className = "bg-slate-800 p-6 rounded-2xl text-2xl font-black border border-slate-700 uppercase btn-tap shadow-lg active:bg-blue-900";
                b.innerText = c;
                b.onclick = () => { 
                    selectedClasse = c; 
                    document.getElementById('step0').classList.add('hidden'); 
                    document.getElementById('step1').classList.remove('hidden'); 
                    document.getElementById('labelClasse').innerText = "Classe : " + c; 
                };
                cont.appendChild(b);
            });
        });

        db.ref('settings/matrix').on('value', snap => { CORRECTION = snap.val(); });

        async function selectColor(color) {
            if(!selectedNum) return alert("Choisis ton numéro !");
            selectedColor = color;
            const userKey = `${color}_${selectedNum}`;
            const snap = await db.ref(`sessions/${selectedClasse}/${userKey}`).once('value');
            const data = snap.val() || {};
            let lastTime = 0;
            Object.values(data).forEach(v => { if(v.timestamp > lastTime) lastTime = v.timestamp; });
            const wait = 120000 - (Date.now() - lastTime);
            document.getElementById('displayUser').innerText = `${color} ${selectedNum}`;
            document.getElementById('banner').className = `p-6 rounded-3xl shadow-2xl bg-session-${color}`;
            if(wait > 0) startTimer(wait);
            initCircuits(Object.keys(data).map(k => k.replace('C','')));
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        function startTimer(ms) {
            document.getElementById('mainForm').classList.add('hidden');
            document.getElementById('timerBlocker').classList.remove('hidden');
            let remaining = Math.floor(ms/1000);
            const intv = setInterval(() => {
                remaining--;
                document.getElementById('timerLabel').innerText = `${Math.floor(remaining/60)}m ${remaining%60}s`;
                if(remaining <= 0) { clearInterval(intv); location.reload(); }
            }, 1000);
        }

        function initCircuits(faits) {
            const sel = document.getElementById('circuitNum');
            sel.innerHTML = '<option value="" selected disabled>-- CHOISIR --</option>';
            for(let i=1; i<=12; i++) {
                if(!faits.includes(i.toString())) sel.add(new Option(`PARCOURS N°${i}`, i));
            }
        }

        function validerSaisie() {
            const c = document.getElementById('circuitNum').value;
            const l1 = document.getElementById('l1').value.toUpperCase().trim();
            const l2 = document.getElementById('l2').value.toUpperCase().trim();
            if(!c || !l1 || !l2) return;
            const sol = CORRECTION[c][selectedColor];
            let count = 0; let ts = [...sol];
            [l1, l2].forEach(l => { let idx = ts.indexOf(l); if(idx > -1) { count++; ts.splice(idx, 1); } });
            let pts = (count === 2) ? 5 : (count === 1) ? 2 : 0;
            db.ref(`sessions/${selectedClasse}/${selectedColor}_${selectedNum}/C${c}`).set({ score: pts, timestamp: Date.now() });
            document.getElementById('msgPoints').innerText = `+${pts} POINTS`;
            document.getElementById('iconScore').innerText = (pts === 5) ? "⭐" : (pts === 2) ? "🆗" : "❌";
            document.getElementById('feedback').classList.remove('hidden');
            setTimeout(() => { location.reload(); }, 3500);
        }
    </script>
</body>
</html>
